<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-label="Legacy Power BI to Microsoft Fabric migration">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="dl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0.28"/>
    </linearGradient>
    <radialGradient id="glowP" cx="0.8" cy="0.15" r="0.5">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="0.18" cy="0.9" r="0.55">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#6366f1" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="600" fill="#060609"/>
  <rect width="1200" height="600" fill="url(#grid)"/>
  <rect width="1200" height="600" fill="url(#glowP)"/>
  <rect width="1200" height="600" fill="url(#glowC)"/>

  <!-- eyebrow -->
  <text x="167" y="114" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="4" fill="#818cf8">DATA ENGINEERING PROJECT</text>

  <!-- title -->
  <text x="165" y="190" font-family="'Segoe UI', system-ui, sans-serif" font-size="56" font-weight="800" fill="#f1f5f9">Legacy Power BI</text>
  <text x="165" y="262" font-family="'Segoe UI', system-ui, sans-serif" font-size="56" font-weight="800" fill="url(#brand)">&#8594; Microsoft Fabric</text>

  <!-- subtitle -->
  <text x="167" y="310" font-family="'Segoe UI', system-ui, sans-serif" font-size="20" font-weight="500" fill="#94a3b8">Enterprise migration &#183; Medallion &#183; Direct Lake &#183; Governance</text>

  <!-- pipeline nodes -->
  <g font-family="'Segoe UI', system-ui, sans-serif" text-anchor="middle">
    <!-- BRONZE -->
    <rect x="165" y="372" width="162" height="66" rx="14" fill="#b45309" fill-opacity="0.16" stroke="#d97706" stroke-width="1.5"/>
    <text x="246" y="404" font-size="18" font-weight="700" letter-spacing="2" fill="#fbbf24">BRONZE</text>
    <text x="246" y="424" font-size="12" font-weight="500" fill="#94a3b8">raw / Delta</text>

    <!-- SILVER -->
    <rect x="401" y="372" width="162" height="66" rx="14" fill="#94a3b8" fill-opacity="0.14" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="482" y="404" font-size="18" font-weight="700" letter-spacing="2" fill="#e2e8f0">SILVER</text>
    <text x="482" y="424" font-size="12" font-weight="500" fill="#94a3b8">clean / typed</text>

    <!-- GOLD -->
    <rect x="637" y="372" width="162" height="66" rx="14" fill="#eab308" fill-opacity="0.15" stroke="#eab308" stroke-width="1.5"/>
    <text x="718" y="404" font-size="18" font-weight="700" letter-spacing="2" fill="#fde047">GOLD</text>
    <text x="718" y="424" font-size="12" font-weight="500" fill="#94a3b8">star: dim / fact</text>

    <!-- DIRECT LAKE -->
    <rect x="873" y="372" width="162" height="66" rx="14" fill="url(#dl)" stroke="#818cf8" stroke-width="1.5"/>
    <text x="954" y="404" font-size="17" font-weight="700" letter-spacing="1" fill="#f1f5f9">DIRECT LAKE</text>
    <text x="954" y="424" font-size="12" font-weight="500" fill="#a5b4fc">RLS / OLS + DAX</text>
  </g>

  <!-- arrows -->
  <g stroke="#818cf8" stroke-width="2.5" fill="#818cf8" opacity="0.85">
    <line x1="339" y1="405" x2="389" y2="405"/>
    <path d="M389 405 l-11 -6 v12 z"/>
    <line x1="575" y1="405" x2="625" y2="405"/>
    <path d="M625 405 l-11 -6 v12 z"/>
    <line x1="811" y1="405" x2="861" y2="405"/>
    <path d="M861 405 l-11 -6 v12 z"/>
  </g>

  <!-- tech tags -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="15.5" font-weight="600" fill="#cbd5e1">
    <text x="167" y="512">PySpark</text>
    <text x="261" y="512" fill="#475569">&#183;</text>
    <text x="281" y="512">Delta Lake</text>
    <text x="391" y="512" fill="#475569">&#183;</text>
    <text x="411" y="512">DAX</text>
    <text x="461" y="512" fill="#475569">&#183;</text>
    <text x="481" y="512">Data Pipeline</text>
    <text x="615" y="512" fill="#475569">&#183;</text>
    <text x="635" y="512">RLS / OLS</text>
    <text x="733" y="512" fill="#475569">&#183;</text>
    <text x="753" y="512">FinOps / F SKU</text>
  </g>

  <!-- dataset footnote -->
  <text x="167" y="556" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="500" fill="#64748b">Public Olist dataset &#183; OneLake &#183; Fabric</text>
</svg>
